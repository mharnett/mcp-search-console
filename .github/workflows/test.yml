name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['20.x', '22.x']

    steps:
      - uses: actions/checkout@v4

      - name: Checkout mcp-test-harness
        uses: actions/checkout@v4
        with:
          repository: mharnett/mcp-test-harness
          token: ${{ secrets.GH_PAT }}
          path: mcp-test-harness

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Build mcp-test-harness
        working-directory: mcp-test-harness
        run: npm install && npm run build

      - run: npm ci
      - run: npm run build
      - run: npm test
