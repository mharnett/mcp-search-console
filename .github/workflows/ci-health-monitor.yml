name: CI Health Monitor

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check for sustained CI failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the latest completed run on main
          LATEST_CONCLUSION=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/test.yml/runs?branch=main&per_page=1" \
            --jq '.workflow_runs[0].conclusion // empty')

          if [ "$LATEST_CONCLUSION" != "failure" ]; then
            echo "CI is not currently failing (conclusion: ${LATEST_CONCLUSION:-in_progress})"

            # Close any open alert issue since CI is healthy
            OPEN=$(gh issue list --label "ci-failure-alert" --state open --json number --jq '.[0].number // empty')
            if [ -n "$OPEN" ]; then
              gh issue close "$OPEN" --comment "CI is green again — closing alert."
              echo "Closed alert issue #$OPEN"
            fi
            exit 0
          fi

          # Find the most recent successful run to calculate downtime
          LAST_SUCCESS=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/test.yml/runs?branch=main&per_page=50" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")] | .[0].created_at // empty')

          NOW=$(date +%s)
          if [ -z "$LAST_SUCCESS" ]; then
            HOURS_FAILING=9999
          else
            LAST_SUCCESS_TS=$(date -d "$LAST_SUCCESS" +%s)
            HOURS_FAILING=$(( (NOW - LAST_SUCCESS_TS) / 3600 ))
          fi

          echo "CI has been failing for ~${HOURS_FAILING}h (threshold: 48h)"

          if [ "$HOURS_FAILING" -lt 48 ]; then
            echo "Under threshold, no alert needed"
            exit 0
          fi

          # Deduplicate: don't open a second issue if one is already open
          EXISTING=$(gh issue list --label "ci-failure-alert" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Alert issue #$EXISTING already open, skipping"
            exit 0
          fi

          # Create the label if it doesn't exist
          gh label create "ci-failure-alert" --color "B60205" --description "CI has been failing for >48h" 2>/dev/null || true

          LAST_SUCCESS_DISPLAY=${LAST_SUCCESS:-"unknown (no recent success found)"}

          gh issue create \
            --title "CI has been failing for ${HOURS_FAILING}h" \
            --label "ci-failure-alert" \
            --body "## CI on \`main\` has been failing for ~${HOURS_FAILING} hours

          **Last successful run:** ${LAST_SUCCESS_DISPLAY}
          **Workflow:** https://github.com/${{ github.repository }}/actions/workflows/test.yml

          This issue was opened automatically. It will close when CI goes green."
